# Top-level Docker Compose for Grafana Learning Lab
#
# Stands up the shared observability stack plus two Grafana instances:
#   - grafana-grafonnet (port 3000) — Grafonnet track
#   - grafana-sdk        (port 3001) — Foundation SDK track
#
# Also runs an OpenTelemetry Collector (otelcol) and six metric-generator
# containers that simulate OTel Demo services sending http.server.request.duration
# metrics, giving the Fleet Overview and Service Dashboard real data to display.

services:
  # ── Shared observability backends ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./shared/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./shared/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./shared/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4317"
      - "4318"
    restart: unless-stopped

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otelcol
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./shared/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint
    depends_on:
      - tempo
    restart: unless-stopped

  # ── Simulated demo services (metric generators) ────────────────────────────
  # Each container sends http.server.request.duration metrics for one service.
  # Service names match the OTel Demo naming convention.
  metric-gen-frontend:
    build: ./metric-generator
    environment:
      - SERVICE_NAME=frontend
      - ERROR_RATE=0.02
    depends_on: [otelcol]
    restart: unless-stopped

  metric-gen-checkout:
    build: ./metric-generator
    environment:
      - SERVICE_NAME=checkoutservice
      - ERROR_RATE=0.03
    depends_on: [otelcol]
    restart: unless-stopped

  metric-gen-cart:
    build: ./metric-generator
    environment:
      - SERVICE_NAME=cartservice
      - ERROR_RATE=0.01
    depends_on: [otelcol]
    restart: unless-stopped

  metric-gen-payment:
    build: ./metric-generator
    environment:
      - SERVICE_NAME=paymentservice
      - ERROR_RATE=0.08
    depends_on: [otelcol]
    restart: unless-stopped

  metric-gen-shipping:
    build: ./metric-generator
    environment:
      - SERVICE_NAME=shippingservice
      - ERROR_RATE=0.02
    depends_on: [otelcol]
    restart: unless-stopped

  metric-gen-recommendation:
    build: ./metric-generator
    environment:
      - SERVICE_NAME=recommendationservice
      - ERROR_RATE=0.01
    depends_on: [otelcol]
    restart: unless-stopped

  # ── Grafana instances ──────────────────────────────────────────────────────
  grafana-grafonnet:
    image: grafana/grafana:13.0.1
    container_name: grafana-grafonnet
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - ./shared/provisioning:/etc/grafana/provisioning:ro
      - grafana-grafonnet-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  grafana-sdk:
    image: grafana/grafana:13.0.1
    container_name: grafana-sdk
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - ./shared/provisioning:/etc/grafana/provisioning:ro
      - grafana-sdk-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-grafonnet-data:
  grafana-sdk-data:
